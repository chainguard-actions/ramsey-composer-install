name: Test basic usage (locked dependencies)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install PHP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y php-cli php-mbstring php-xml composer
      - id: action
        uses: .
        with:
          dependency-versions: locked
          working-directory: ${{ github.workspace }}
      - name: Assert vendor directory exists
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/vendor" ]; then
            echo "FAIL: vendor directory not found"
            exit 1
          fi
          echo "PASS: vendor directory exists"
      - name: Assert autoload file exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/vendor/autoload.php" ]; then
            echo "FAIL: vendor/autoload.php not found"
            exit 1
          fi
          echo "PASS: vendor/autoload.php exists"
